# ── MedBook CI/CD Pipeline ────────────────────────────────────────────────────
name: MedBook CI/CD

on:
  push:
    branches: [main]

jobs:
  # ── Job 1: Syntax check ────────────────────────────────────────────────────
  test:
    name: Check Code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          if [ -f backend/requirements.txt ]; then
            pip install -r backend/requirements.txt
          fi

      - name: Check Python syntax
        run: |
          # Only check if files exist to avoid errors
          shopt -s nullglob
          for f in backend/*.py backend/routers/*.py; do
            python -m py_compile "$f" && echo "OK: $f"
          done

  # ── Job 2: Deploy to server ────────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: test  # Only runs if test job passes
    steps:
      - name: SSH into server and redeploy
        uses: appleboy/ssh-action@v1
        with:
          # UPDATED: These must match exactly what you typed in GitHub Secrets
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: 22
          script: |
            # Navigate to the correct folder we set up earlier
            cd /home/ec2-user/medbook
            
            # Pull latest code
            git pull origin main
            
            # Use the deployment script we optimized for Amazon Linux
            bash deploy.sh
            
            echo "Successfully deployed to Amazon Linux at $(date)"