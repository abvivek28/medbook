version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: medbook-app
    restart: unless-stopped
    environment:
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
    volumes:
      - medbook-data:/app/data
    ports:
      - "80:8000"       # maps server port 80 → app port 8000
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/doctors/specializations')"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  medbook-data:
    driver: local